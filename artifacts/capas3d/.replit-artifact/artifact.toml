kind = "web"
previewPath = "/"
title = "capas.3d"
version = "1.0.0"
id = "artifacts/capas3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20486

[services.development]
run = "pnpm --filter @workspace/capas3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/capas3d", "run", "build" ]
publicDir = "artifacts/capas3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20486"
BASE_PATH = "/"
